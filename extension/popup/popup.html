<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #0d0d1a;
      color: #e2e8f0;
      padding: 14px;
    }
    h1 { font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    select {
      width: 100%;
      padding: 6px 8px;
      background: #111122;
      border: 1px solid #2d2d4e;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #7c3aed;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled { background: #2d2d4e; color: #6b7280; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #6b7280;
      min-height: 16px;
      text-align: center;
    }
    #status.ok  { color: #34d399; }
    #status.err { color: #f87171; }
    #details { margin-top: 12px; }
    .detail-section { margin-bottom: 10px; }
    .detail-heading {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .detail-heading.ok   { color: #34d399; }
    .detail-heading.err  { color: #f87171; }
    .detail-heading.warn { color: #f59e0b; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      line-height: 1.6;
    }
    .chip-ok   { background: #052e16; color: #6ee7b7; border: 1px solid #065f46; }
    .chip-err  { background: #2a0d0d; color: #fca5a5; border: 1px solid #7f1d1d; }
    .chip-warn { background: #1c1400; color: #fcd34d; border: 1px solid #78350f; }
  </style>
</head>
<body>
  <h1>Charles Autofill</h1>
  <label for="resume-select">Resume</label>
  <select id="resume-select">
    <option value="">Loading…</option>
  </select>
  <button id="fill-btn" disabled>Fill Form</button>
  <div id="status"></div>
  <div id="details"></div>
  <script src="../dist/popup/popup.js"></script>
</body>
</html>
